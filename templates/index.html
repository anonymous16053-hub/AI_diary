<!doctype html>
<html>
  <head>
    <title>AI Emotional Diary</title>

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Poppins", sans-serif;
        background: #f5f7fb;
        margin: 0;
        padding: 0;
      }

      .container {
        width: 90%;
        max-width: 900px;
        margin: auto;
        margin-top: 30px;
      }

      h1 {
        text-align: center;
        color: #333;
      }

      .card {
        background: white;
        padding: 20px;
        margin-top: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }

      textarea {
        width: 100%;
        height: 120px;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
        resize: none;
      }

      button {
        background: #4caf50;
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 8px;
        cursor: pointer;
        margin-top: 10px;
      }

      button:hover {
        background: #45a049;
      }

      #chatbox {
        height: 250px;
        overflow-y: auto;
        border: 1px solid #ddd;
        padding: 10px;
        border-radius: 8px;
        background: #fafafa;
      }

      .user {
        text-align: right;
        margin: 8px;
      }

      .ai {
        text-align: left;
        margin: 8px;
      }

      .bubble {
        display: inline-block;
        padding: 8px 12px;
        border-radius: 10px;
        max-width: 70%;
      }

      .user .bubble {
        background: #4caf50;
        color: white;
      }

      .ai .bubble {
        background: #e0e0e0;
      }

      input {
        width: 75%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
      }

      .history {
        margin-top: 10px;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>

  <body>
    <!-- 🔐 LOGIN SECTION -->
    <div id="loginSection" style="text-align: center; margin-top: 50px">
      <h2>🔐 Login</h2>
      <input type="text" id="username" placeholder="Username" /><br /><br />
      <input type="text" id="email" placeholder="email ID" /> <br />
      <br />
      <input type="password" id="password" placeholder="Password" /><br /><br />
      <button onclick="login()">Login</button>
      <button onclick="register()">Register</button>
    </div>

    <!-- 🧠 MAIN APP (HIDDEN INITIALLY) -->
    <div id="appSection" style="display: none">
      <div class="container">
        <h1>🧠 AI Emotional Diary</h1>

        <!-- Diary -->
        <div class="card">
          <h3>📝 Write your thoughts</h3>
          <textarea id="diary"></textarea>
          <button onclick="saveEntry()">Save Entry</button>
        </div>

        <!-- Chat -->
        <div class="card">
          <h3>🤖 Talk to AI</h3>
          <div id="chatbox"></div>
          <br />

          <input type="text" id="message" placeholder="Type your message..." />
          <button onclick="sendMessage()">Send</button>
        </div>

        <!-- History -->
        <div class="card">
          <h3>📊 Mood History</h3>
          <button onclick="loadHistory()">View History</button>
          <div id="history" class="history"></div>
        </div>

        <div class="card">
          <h3>📈 AI Mood Analytics</h3>

          <canvas id="moodChart"></canvas>

          <div id="stats"></div>
        </div>
      </div>
    </div>

    <script src="/static/script.js"></script>
  </body>
</html>
